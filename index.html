<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Monitoramento IoT</title>
  <link rel="stylesheet" href="frontend/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
  <header>
    <h1>Dashboard de Monitoramento IoT</h1>
  </header>
  <main>
    <section class="controls">
      <label>Sistema: <select id="systems"></select></label>
      <label>Dispositivo: <select id="devices"></select></label>
      <button id="refresh">Atualizar</button>
    </section>
    <section class="chart">
      <canvas id="chart"></canvas>
    </section>
    <section class="latest">
      <h3>Leitura Instantânea</h3>
      <div id="instant">Nenhuma</div>
    </section>
  </main>
  <script src="frontend/app.js"></script>
</body>
</html>
